<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>No — elliottdelapreatgmail.com</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shadows+Into+Light&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      min-height: 100vh;
      background: #fff;
      cursor: none;
    }
    body {
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }
    main { text-align: center; }
    #angry-wrap {
      position: relative;
      display: inline-block;
    }
    #angry {
      display: block;
      width: min(420px, 78vw);
      height: auto;
    }
    .puff {
      position: absolute;
      left: 0;
      top: 0;
      border: 2.5px solid rgba(47, 47, 47, 0.85);
      border-radius: 50%;
      background: #fff;
      pointer-events: none;
      will-change: transform, opacity;
    }
    a {
      display: block;
      margin-top: 2rem;
      font-family: 'Shadows Into Light', cursive;
      color: #2f2f2f;
      font-size: 1.5rem;
    }
  </style>
</head>
<body>
  <main>
    <div id="angry-wrap">
      <svg id="angry" viewBox="0 0 420 420" role="img"
           aria-label="A very angry man, trembling with rage, steam shooting out of his ears"
           fill="none" stroke="#2f2f2f" stroke-width="5"
           stroke-linecap="round" stroke-linejoin="round">
        <!-- head -->
        <path d="M 210 95 C 280 92, 342 150, 338 228 C 335 305, 272 358, 205 355 C 138 352, 80 300, 82 224 C 84 150, 141 97, 214 96"/>
        <!-- angry hair standing up -->
        <path d="M 178 101 L 168 74"/>
        <path d="M 208 93 L 206 66"/>
        <path d="M 238 98 L 248 72"/>
        <!-- ears -->
        <path d="M 84 200 C 58 194, 54 250, 82 253"/>
        <path d="M 336 200 C 362 194, 366 251, 338 253"/>
        <!-- forehead creases -->
        <path d="M 204 158 L 201 179" stroke-width="4"/>
        <path d="M 218 158 L 221 179" stroke-width="4"/>
        <!-- manga anger vein -->
        <g stroke-width="4">
          <path d="M 291 106 C 295 114, 295 124, 291 132"/>
          <path d="M 309 106 C 305 114, 305 124, 309 132"/>
          <path d="M 286 111 C 294 115, 306 115, 314 111"/>
          <path d="M 286 127 C 294 123, 306 123, 314 127"/>
        </g>
        <!-- furious eyebrows -->
        <path d="M 126 168 C 150 173, 172 184, 191 197" stroke-width="8"/>
        <path d="M 294 168 C 270 173, 248 184, 229 197" stroke-width="8"/>
        <!-- narrowed eyes -->
        <path d="M 146 212 L 179 216" stroke-width="6"/>
        <path d="M 274 212 L 241 216" stroke-width="6"/>
        <!-- nose -->
        <path d="M 210 216 C 205 233, 201 244, 214 252"/>
        <!-- gritted teeth -->
        <path d="M 150 301 C 176 287, 244 287, 270 301"/>
        <path d="M 152 303 C 173 317, 247 317, 268 303"/>
        <g stroke-width="4">
          <path d="M 170 294 L 171 310"/>
          <path d="M 190 290 L 191 313"/>
          <path d="M 210 289 L 211 314"/>
          <path d="M 230 290 L 231 313"/>
          <path d="M 250 294 L 251 310"/>
        </g>
      </svg>
    </div>
    <a href="index.html">&larr; back to the question</a>
  </main>
  <script src="pencil.js?v=10"></script>
  <script>
    (function () {
      var wrap = document.getElementById('angry-wrap');
      var svg = document.getElementById('angry');
      var puffs = [];

      function spawn(side) {
        var r = svg.getBoundingClientRect();
        if (!r.width) return;
        var size = 9 + Math.random() * 17;
        var el = document.createElement('div');
        el.className = 'puff';
        el.style.width = el.style.height = size + 'px';
        wrap.appendChild(el);
        puffs.push({
          el: el, t: 0, size: size,
          x: (side < 0 ? 0.135 : 0.865) * r.width + side * 8 - size / 2,
          y: 0.535 * r.height - size / 2,
          vx: side * (70 + Math.random() * 100),
          vy: -(25 + Math.random() * 60)
        });
      }

      var last = performance.now(), acc = 0, side = -1;
      setInterval(function () {
        var t = performance.now();
        var dt = Math.min((t - last) / 1000, 0.1);
        last = t;
        acc += dt;
        while (acc > 0.07) {           // a fresh puff every 70ms — very rapid pace
          acc -= 0.07;
          spawn(side);
          side = -side;
        }
        for (var i = puffs.length - 1; i >= 0; i--) {
          var p = puffs[i];
          p.t += dt;
          var u = p.t / 0.8;
          if (u >= 1) { p.el.remove(); puffs.splice(i, 1); continue; }
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.el.style.transform =
            'translate(' + p.x + 'px,' + p.y + 'px) scale(' + (0.7 + u) + ')';
          p.el.style.opacity = String(0.95 * (1 - u));
        }
        // trembling with rage
        svg.style.transform =
          'translate(' + ((Math.random() - 0.5) * 3) + 'px,' +
          ((Math.random() - 0.5) * 3) + 'px) ' +
          'rotate(' + ((Math.random() - 0.5) * 1.2) + 'deg)';
      }, 33);
    })();
  </script>
</body>
</html>
